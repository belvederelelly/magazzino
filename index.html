<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belvedere Smart - Modulo Finanza Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 font-sans h-screen flex flex-col justify-center items-center px-6">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-white uppercase mb-1">Belvedere Finanza</h1>
    </div>
    
    <div class="w-full max-w-sm space-y-4">
        <input type="email" id="email-field" class="w-full bg-slate-800 border-2 border-slate-700 text-white rounded-xl py-4 px-5 focus:outline-none font-bold text-center" placeholder="EMAIL UTENTE">
        <input type="password" id="pass-field" class="w-full bg-slate-800 border-2 border-slate-700 text-white rounded-xl py-4 px-5 focus:outline-none font-bold text-center" placeholder="PASSWORD">
        
        <button onclick="window.handleAuth()" id="btn-login" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-xl uppercase shadow-lg">
            ENTRA (NUOVO TEST)
        </button>
    </div>

    <script>
        const SB_URL = 'https://nizktofcamulygzszydw.supabase.co';
        const SB_KEY = 'sb_publishable_X6Oml3MZiMid06t3UKrjGw_qan_DuIH';
        let supabase;

        window.onload = function() {
            if (window.supabase) {
                supabase = window.supabase.createClient(SB_URL, SB_KEY);
            }
        };

        window.handleAuth = async function() {
            alert("BINGO! Il bottone ora è vivo e cliccabile.");
            
            if (!supabase) return alert("Errore: Supabase non caricato. Ricarica la pagina.");

            let email = document.getElementById('email-field').value.trim();
            let password = document.getElementById('pass-field').value.trim();
            let btn = document.getElementById('btn-login');

            if (!email || !password) return alert("Inserisci email e password.");
            
            btn.innerText = "VERIFICA IN CORSO...";
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    alert("SUPABASE DICE NO:\n" + error.message);
                    btn.innerText = "ENTRA (NUOVO TEST)";
                } else {
                    alert("ACCESSO RIUSCITO!");
                    btn.innerText = "SEI DENTRO!";
                }
            } catch (err) {
                alert("Errore strano:\n" + err.message);
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazzino Smart PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
</head>
<body class="bg-gray-50 font-sans pb-24">

    <header class="bg-slate-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <h1 class="font-bold text-emerald-400"><i class="fas fa-box-open mr-2"></i>Gestione Ristorante</h1>
        <div id="status-db" class="text-[10px] bg-emerald-900 text-emerald-300 px-2 py-1 rounded-full">DB Online</div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <section id="scanner-section" class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
            <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                <h2 class="font-bold text-slate-700 underline decoration-emerald-500">Scanner Barcode</h2>
                <span class="text-xs text-slate-400">Database Mondiale Attivo</span>
            </div>
            
            <div id="reader" class="w-full bg-black min-h-[300px]"></div>

            <div id="scanned-result" class="p-4 hidden animate-pulse bg-emerald-50 text-emerald-700 text-sm font-medium">
                Prodotto identificato! Recupero dati...
            </div>
        </section>

        <section class="bg-white rounded-3xl shadow-xl p-6 border-t-4 border-amber-500">
            <h2 class="font-bold text-lg mb-2">Chiusura Serale</h2>
            <p class="text-xs text-slate-500 mb-4">Carica la foto del resoconto di cassa per scaricare il magazzino.</p>
            
            <label class="w-full flex flex-col items-center px-4 py-6 bg-slate-50 text-slate-400 rounded-xl border-2 border-dashed border-slate-300 cursor-pointer hover:bg-slate-100 transition">
                <i class="fas fa-receipt text-3xl mb-2"></i>
                <span class="text-sm">Scansiona Scontrino</span>
                <input type="file" class="hidden" accept="image/*" id="receipt-upload" onchange="processReceipt(event)" />
            </label>
            <div id="ocr-status" class="mt-2 text-xs font-mono text-slate-500"></div>
        </section>

        <div id="form-carico" class="bg-white rounded-3xl shadow-xl p-6 hidden">
            <div class="flex items-center mb-4">
                <img id="prod-img" src="" class="w-16 h-16 rounded-lg object-cover mr-4 border hidden">
                <div>
                    <h3 id="prod-name" class="font-bold text-slate-800">Nome Prodotto</h3>
                    <p id="prod-brand" class="text-xs text-slate-500">Marca</p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Quantità</label>
                    <input type="number" id="qnt" value="1" class="w-full p-2 border rounded-lg text-lg font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Posizione</label>
                    <select id="pos" class="w-full p-2 border rounded-lg">
                        <option>Cella Frigo</option>
                        <option>Secco</option>
                        <option>Cantina</option>
                    </select>
                </div>
            </div>
            <button onclick="salvaSuSupabase()" class="w-full mt-4 bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 transition shadow-lg">
                CONFERMA CARICO
            </button>
        </div>

    </main>

    <script>
        const supabaseUrl = 'https://nizktofcamulygzszydw.supabase.co';
        const supabaseKey = 'sb_publishable_X6Oml3MZiMid06t3UKrjGw_qan_DuIH';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentProduct = null;

        // --- 1. CONFIGURAZIONE SCANNER BARCODE ---
        const html5QrCode = new Html5Qrcode("reader");
        const qrConfig = { fps: 10, qrbox: { width: 250, height: 150 } };

        html5QrCode.start({ facingMode: "environment" }, qrConfig, onScanSuccess);

        async function onScanSuccess(decodedText) {
            // Vibrazione se supportata
            if (navigator.vibrate) navigator.vibrate(100);
            
            document.getElementById('scanned-result').classList.remove('hidden');
            
            // --- 2. RICERCA SU DATABASE MONDIALE (Open Food Facts) ---
            try {
                const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${decodedText}.json`);
                const data = await res.json();

                if (data.status === 1) {
                    const p = data.product;
                    currentProduct = {
                        nome: p.product_name || "Sconosciuto",
                        barcode: decodedText,
                        marca: p.brands || "Generico",
                        img: p.image_front_small_url || ""
                    };
                    mostraForm(currentProduct);
                } else {
                    alert("Prodotto non trovato nel database mondiale. Inserimento manuale.");
                }
            } catch (e) {
                console.error("Errore database:", e);
            }
        }

        function mostraForm(p) {
            document.getElementById('form-carico').classList.remove('hidden');
            document.getElementById('prod-name').innerText = p.nome;
            document.getElementById('prod-brand').innerText = p.marca;
            if(p.img) {
                const imgTag = document.getElementById('prod-img');
                imgTag.src = p.img;
                imgTag.classList.remove('hidden');
            }
        }

        // --- 3. SALVATAGGIO SU SUPABASE ---
        async function salvaSuSupabase() {
            const qnt = parseFloat(document.getElementById('qnt').value);
            const pos = document.getElementById('pos').value;

            // Logica identica alla precedente per tabelle prodotti, movimenti e giacenze
            const { data: prodData } = await supabase.from('prodotti').upsert({
                nome_prodotto: currentProduct.nome,
                codice_a_barre: currentProduct.barcode,
                unita_misura: 'pz'
            }, { onConflict: 'codice_a_barre' }).select().single();

            await supabase.from('movimenti').insert({
                prodotto_id: prodData.id,
                tipo: 'carico',
                quantita: qnt
            });

            alert("Dati salvati in Supabase!");
            document.getElementById('form-carico').classList.add('hidden');
        }

        // --- 4. FUNZIONE OCR (CHIUSURA SERALE) ---
        async function processReceipt(event) {
            const file = event.target.files[0];
            const status = document.getElementById('ocr-status');
            status.innerText = "Lettura scontrino in corso (OCR)...";

            Tesseract.recognize(file, 'ita', { logger: m => console.log(m) })
            .then(({ data: { text } }) => {
                status.innerText = "Analisi completata!";
                console.log("Testo estratto dallo scontrino:", text);
                
                // Qui aggiungeremo il parser per trovare i piatti (es: Carbonara x10)
                alert("Ho letto lo scontrino. Ora posso confrontarlo con le tue ricette per scalare il magazzino.");
            });
        }
    </script>

</body>
</html>

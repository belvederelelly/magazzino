<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Nostra App - Database Supabase</title>
  
  <!-- 1. Importazione di Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Stile di base per renderla presentabile -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f7f6;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    input[type="text"] {
      width: 70%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 15px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button.delete {
      background-color: #dc3545;
      padding: 5px 10px;
      font-size: 14px;
    }
    ul {
      list-style-type: none;
      padding: 0;
    }
    li {
      background: #eee;
      margin: 5px 0;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Inserisci un nuovo record</h2>
    <div style="display: flex; gap: 10px;">
      <input type="text" id="inputDato" placeholder="Scrivi qui il valore da salvare...">
      <button onclick="salvaDato()">Salva nel DB</button>
    </div>
  </div>

  <div class="card">
    <h2>Dati salvati in memoria</h2>
    <ul id="listaDati">
      <li>Caricamento dati in corso...</li>
    </ul>
  </div>

  <script>
    // ==========================================
    // 2. CONFIGURAZIONE SUPABASE
    // ==========================================
    // Inserisci qui i tuoi dati presi dalla Dashboard di Supabase
    const SUPABASE_URL = 'https://INSERISCI_IL_TUO_URL.supabase.co';
    const SUPABASE_ANON_KEY = 'INSERISCI_LA_TUA_CHIAVE';
    
    // Inizializza il client senza nessuna opzione di autenticazione
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Cambia questo con il nome reale della tua tabella
    const NOME_TABELLA = 'nome_della_tua_tabella'; 
    // Cambia questo con il nome della colonna in cui vuoi salvare il testo
    const NOME_COLONNA = 'testo'; 

    // ==========================================
    // 3. FUNZIONI DEL DATABASE
    // ==========================================

    // Funzione per LEGGERE i dati dal database
    async function caricaDati() {
      const lista = document.getElementById('listaDati');
      
      const { data, error } = await supabase
        .from(NOME_TABELLA)
        .select('*')
        .order('id', { ascending: false }); // Ordina dal più recente (se hai una colonna id)

      if (error) {
        lista.innerHTML = `<li>Errore di lettura: ${error.message}</li>`;
        console.error("Errore Supabase:", error);
        return;
      }

      // Pulisce la lista prima di aggiornarla
      lista.innerHTML = '';

      if (data.length === 0) {
        lista.innerHTML = '<li>Nessun dato presente nel database.</li>';
        return;
      }

      // Genera gli elementi della lista
      data.forEach(record => {
        const li = document.createElement('li');
        
        // Stampa il valore della colonna specificata
        const span = document.createElement('span');
        span.textContent = record[NOME_COLONNA] || 'Dato vuoto';
        
        // Tasto per eliminare il singolo record
        const btnDelete = document.createElement('button');
        btnDelete.textContent = 'Elimina';
        btnDelete.className = 'delete';
        btnDelete.onclick = () => eliminaDato(record.id);

        li.appendChild(span);
        li.appendChild(btnDelete);
        lista.appendChild(li);
      });
    }

    // Funzione per SCRIVERE un nuovo dato nel database
    async function salvaDato() {
      const input = document.getElementById('inputDato');
      const valore = input.value.trim();

      if (!valore) {
        alert("Inserisci un valore prima di salvare!");
        return;
      }

      // Creazione dell'oggetto da inserire
      const nuovoRecord = {};
      nuovoRecord[NOME_COLONNA] = valore;

      const { error } = await supabase
        .from(NOME_TABELLA)
        .insert([nuovoRecord]);

      if (error) {
        alert("Errore durante il salvataggio: " + error.message);
        console.error(error);
      } else {
        input.value = ''; // Svuota il campo di testo
        caricaDati();     // Ricarica la lista per mostrare il nuovo dato
      }
    }

    // Funzione per ELIMINARE un dato
    async function eliminaDato(id) {
      if (!confirm("Sei sicuro di voler eliminare questo record?")) return;

      const { error } = await supabase
        .from(NOME_TABELLA)
        .delete()
        .eq('id', id);

      if (error) {
        alert("Errore durante l'eliminazione: " + error.message);
        console.error(error);
      } else {
        caricaDati(); // Ricarica la lista aggiornata
      }
    }

    // ==========================================
    // 4. AVVIO DELL'APP
    // ==========================================
    // Carica i dati in automatico all'apertura della pagina
    window.onload = caricaDati;

  </script>
</body>
</html>
